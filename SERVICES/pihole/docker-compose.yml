services:
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8081:80/tcp"
    environment:
      TZ: "America/Chicago"
      WEBPASSWORD: "12121212"
      PIHOLE_DNS_: "1.1.1.1;1.0.0.1"
    volumes:
      - /mnt/user/appdata/pihole/etc-pihole:/etc/pihole
      - /mnt/user/appdata/pihole/etc-dnsmasq.d:/etc/dnsmasq.d
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - NET_BIND_SERVICE
